# =============================================================================
# ParaBank Automation Framework - Configuration Properties
# =============================================================================

# Application URL
base.url=https://parabank.parasoft.com/parabank

# Browser Configuration (chrome | firefox | edge)
browser=chrome

# Run headless (true for CI/CD pipelines)
headless=false

# Implicit wait in seconds (use explicit waits; this is a safety net)
implicit.wait=0

# Explicit wait timeout in seconds
explicit.wait=50

# Page load timeout in seconds
page.load.timeout=30

# =============================================================================
# Test Data - Valid Credentials
# =============================================================================
valid.username=mo23
valid.password=123456789

# Test Data - Invalid Credentials
invalid.username=wrong_user
invalid.password=wrong_pass
# =============================================================================
# Reporting
# =============================================================================
reports.dir=test-output/ExtentReports
screenshots.dir=test-output/screenshots
